<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhatsApp Full Chat</title>
<style>
:root{--bg:#111b21;--panel:#202c33;--accent:#25d366;--muted:#97a4ab;--online:#25d366;--offline:#8696a0}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#e9edef;font-family:Arial,system-ui;min-height:100vh;display:flex;flex-direction:column}

/* --- LOADER CSS --- */
#loader-wrapper { position: fixed; inset: 0; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
.loader-wheel { width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #ffeb3b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
.loader-text { color: #ffeb3b; font-size: 14px; font-weight: 500; letter-spacing: 1px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

#app{max-width:1100px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;position:relative;transition:transform .28s ease}
#topBar{padding:8px 12px;background:#0b141a;display:flex;align-items:center;gap:12px;z-index:5}
#title{font-weight:600;display:flex;align-items:center;gap:10px}
#notifWrap{display:flex;align-items:center;gap:8px}
.bell{position:relative;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.04)}
.badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:12px;background:#ff3b30;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0 6px;box-shadow:0 2px 6px rgba(0,0,0,.6); font-weight: bold;}

/* --- PLAY STORE BUTTON STYLE --- */
.playStoreBtn { background: var(--accent); color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 6px; white-space: nowrap; text-transform: uppercase; }

#panel{position:fixed;right:0;top:0;height:100vh;width:360px;background:#081214;border-left:1px solid rgba(255,255,255,.03);transform:translateX(100%);transition:transform .28s ease;z-index:20;box-shadow:-20px 0 60px rgba(0,0,0,.6);display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
.panelHeader{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:center;gap:8px}
.panelTitle{font-weight:700}
.panelClose{margin-left:auto;background:none;border:0;color:var(--accent);cursor:pointer;font-size:18px}
.panelList{padding:8px;overflow:auto;flex:1}
.panelItem{padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.panelItem:hover{background:rgba(255,255,255,.02)}
.panelItem .who{flex:1}
.panelItem .count{background:var(--accent);color:#fff;border-radius:12px;padding:2px 8px;font-size:12px; font-weight: bold;}

#messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#071215}
.msg-row{display:flex;align-items:flex-end;max-width:80%;position:relative}
.msg-row.self{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 8px;position:relative;cursor:pointer;border:2px solid transparent;transition:border .18s ease-in-out;overflow:hidden}
.avatar.online{border-color:var(--accent);box-shadow:0 0 0 0 rgba(37,211,102,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6)}70%{box-shadow:0 0 0 6px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
.bubble{background:var(--panel);padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.3;word-break:break-word;position:relative}
.bubble audio{max-width:200px;height:35px;margin-top:5px;display:block}
.msg-row.self .bubble{background:#005c4b}
.meta{font-size:12px;color:#53bdeb;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.time{font-size:11px;color:var(--muted);margin-top:6px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px}
#inputBar{display:flex;padding:10px;background:var(--panel);align-items:center;gap:8px}
#messageInput{flex:1;padding:10px;border-radius:22px;border:0;background:#2a3942;color:#fff;outline:none;font-size:14px}
#sendBtn, .groupMediaBtn{width:44px;height:44px;border-radius:50%;border:0;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#statusLine{padding:6px 12px;font-size:13px;color:var(--muted);background:#071215}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:#2a3942;color:#fff;padding:10px 14px;border-radius:10px;z-index:999;opacity:0;transition:opacity .25s,bottom .25s}
#toast.show{opacity:1;bottom:40px}
#loginWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:999}
#loginCard{background:#0b141a;padding:18px;border-radius:12px;display:flex;flex-direction:column;gap:10px;min-width:300px}
#loginCard input{padding:10px;border-radius:10px;border:0;background:#162027;color:#fff}
#loginCard button{padding:10px;border-radius:10px;border:0;background:var(--accent);color:#fff;cursor:pointer}
#settingsWrap{position:relative}
#settingsBtn{cursor:pointer;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,.04);background:transparent;color:var(--muted)}
#settingsPanel{position:absolute;right:0;top:48px;background:#0b141a;border:1px solid rgba(255,255,255,.1);padding:12px;border-radius:12px;display:none;z-index:100;min-width:260px;box-shadow: 0 8px 24px rgba(0,0,0,0.5)}
.settingRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.toggleBtn{width:46px;height:26px;border-radius:16px;background:#2a3942;position:relative;cursor:pointer;flex-shrink:0}
.toggleKnob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .18s}
#logoutBtn{width:100%;background:#ff3b30;color:#fff;border:0;padding:8px;border-radius:8px;margin-top:10px;cursor:pointer;font-weight:600}
#privatePopup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:1000}
.card{background:#0b141a;padding:12px;border-radius:12px;max-width:680px;width:96%;display:flex;flex-direction:column;max-height:92%}
#privateHeader{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.user-info-mini {display:flex; flex-direction:column; gap:2px}
.online-dot {width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px}
.status-text {font-size:11px; color:var(--muted)}
#privateMessages{flex:1;overflow:auto;padding:8px;background:#071215;border-radius:8px;display:flex;flex-direction:column;gap:8px}
.private-bubble{background:#162027;padding:8px 10px;border-radius:10px;max-width:80%;position:relative; font-size: 14px;}
.private-row.self{align-self:flex-end}
.private-row.self .private-bubble{background:#005c4b}
#privateInputBar{display:flex;gap:8px;margin-top:8px;align-items:center}
#privateInput{flex:1;padding:10px;border-radius:22px;border:0;background:#2a3942;color:#fff}
#privateSend, .mediaBtn{width:40px;height:40px;border-radius:50%;border:0;background:var(--accent);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#privateMessages img{max-width:200px;border-radius:8px;margin-top:5px;display:block}
#privateMessages audio{max-width:240px;height:35px;margin-top:5px}

@media(max-width:600px){ #panel{width:100%} }
</style>
</head>
<body>

<div id="loader-wrapper">
    <div class="loader-wheel"></div>
    <div class="loader-text">Loading Group Chat...</div>
</div>

<div id="panel" aria-hidden="true">
    <div class="panelHeader">
        <div class="panelTitle">Private Chats</div>
        <button id="panelClose" class="panelClose">✕</button>
    </div>
    <div class="panelList" id="panelList"></div>
</div>

<div id="app">
    <div id="topBar">
        <div id="title"><div id="titleText">Group Chat</div></div>
        <div style="flex:1"></div>
        <div id="notifWrap">
            <a href="https://play.google.com/store/apps/details?id=tamil.group" target="_blank" class="playStoreBtn">Get App</a>
            <div class="bell" id="bellBtn">🔔<div class="badge" id="bellBadge" style="display:none">0</div></div>
            <div id="settingsWrap">
                <button id="settingsBtn">⚙️</button>
                <div id="settingsPanel">
                    <div class="settingRow"><div>Audio Call</div><div class="toggleBtn" id="toggleCall"><div class="toggleKnob" id="toggleCallKnob"></div></div></div>
                    <div class="settingRow"><div>Message Tone</div><div class="toggleBtn" id="toggleTone"><div class="toggleKnob" id="toggleToneKnob"></div></div></div>
                    <button id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </div>
    <div id="onlineCount" style="color:var(--muted);font-size:13px;margin-left:12px; margin-top:5px;"></div>
    <div id="statusLine"></div>
    <div id="messages"></div>
    <div id="inputBar">
        <input id="messageInput" placeholder="Type a message" autocomplete="off"/>
        <button id="sendBtn">➤</button>
    </div>
</div>

<div id="privatePopup">
    <div class="card">
        <div id="privateHeader">
            <button id="closePrivate" style="background:none;border:0;color:var(--accent);font-size:18px;cursor:pointer">⬅</button>
            <div class="user-info-mini">
                <div style="font-weight:700" id="privateTitle">User</div>
                <div class="status-text"><span id="headerDot" class="online-dot" style="background:var(--offline)"></span><span id="headerStatusText">offline</span></div>
            </div>
        </div>
        <div id="privateMessages"></div>
        <div id="privateInputBar">
            <input type="file" id="privImgFile" accept="image/*" style="display:none">
            <button class="mediaBtn" onclick="document.getElementById('privImgFile').click()">📷</button>
            <input id="privateInput" placeholder="Type a message" autocomplete="off"/>
            <button id="privateSend">➤</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<div id="loginWrap"><div id="loginCard"><div style="font-weight:700;color:#fff">Enter your name</div><input id="nameInput" placeholder="Your name" /><button id="joinBtn">Join</button></div></div>

<audio id="dingAudio" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

window.addEventListener('load', () => { setTimeout(() => { document.getElementById('loader-wrapper').style.display = 'none'; }, 1000); });

let username = localStorage.getItem('guestName') || '';
let currentPrivateWith = null;
let settings = JSON.parse(localStorage.getItem('chat_settings') || '{"audioCall":true,"messageTone":true}');

const bellBtn = document.getElementById('bellBtn'), bellBadge = document.getElementById('bellBadge'), panelEl = document.getElementById('panel'), panelListEl = document.getElementById('panelList');
const privatePopup = document.getElementById('privatePopup'), privateMessages = document.getElementById('privateMessages'), privateInput = document.getElementById('privateInput');

// --- NOTIFICATION & UNREAD LOGIC ---

function updateBellBadge() {
    db.ref(`unread/${username}`).on('value', snap => {
        const data = snap.val() || {};
        let total = 0;
        Object.values(data).forEach(count => total += count);
        if(total > 0) {
            bellBadge.textContent = total;
            bellBadge.style.display = 'flex';
        } else {
            bellBadge.style.display = 'none';
        }
        refreshPanelList(data);
    });
}

function refreshPanelList(unreadData = {}) {
    panelListEl.innerHTML = '';
    db.ref('status').once('value', snap => {
        const users = snap.val() || {};
        // Also include people who sent messages but are offline
        const allRelevant = new Set([...Object.keys(users), ...Object.keys(unreadData)]);
        
        allRelevant.forEach(u => {
            if(u === username) return;
            const item = document.createElement('div');
            item.className = 'panelItem';
            const count = unreadData[u] || 0;
            item.innerHTML = `<div class="who">${u} ${users[u] ? '🟢' : '⚪'}</div>${count > 0 ? `<div class="count">${count}</div>` : ''}`;
            item.onclick = () => openPrivatePopup(u);
            panelListEl.appendChild(item);
        });
    });
}

// Global listener for sound on new messages
function startGlobalPrivateListener() {
    db.ref(`privateChats`).on('child_added', chatSnap => {
        const chatKey = chatSnap.key;
        if(chatKey.includes(username)) {
            db.ref(`privateChats/${chatKey}`).limitToLast(1).on('child_added', msgSnap => {
                const msg = msgSnap.val();
                if(msg.name !== username && (Date.now() - msg.time < 5000)) {
                    if(settings.messageTone) document.getElementById('dingAudio').play().catch(()=>{});
                    showToast(`New message from ${msg.name}`);
                }
            });
        }
    });
}

// --- CORE FUNCTIONS ---

function chatId(a,b){ return [a,b].sort().join('_'); }

function openPrivatePopup(target) {
    currentPrivateWith = target;
    document.getElementById('privateTitle').textContent = target;
    privatePopup.style.display = 'flex';
    panelEl.classList.remove('open');
    
    // Mark as read
    db.ref(`unread/${username}/${target}`).remove();
    
    const key = chatId(username, target);
    privateMessages.innerHTML = '';
    db.ref(`privateChats/${key}`).off();
    db.ref(`privateChats/${key}`).on('child_added', snap => {
        renderPrivateMsg(snap.val());
        scrollToBottom(privateMessages);
    });
}

function renderPrivateMsg(data) {
    const isSelf = data.name === username;
    const row = document.createElement('div');
    row.className = 'private-row' + (isSelf ? ' self' : '');
    const b = document.createElement('div');
    b.className = 'private-bubble';
    if(data.text) b.textContent = data.text;
    if(data.image) b.innerHTML = `<img src="${data.image}">`;
    row.appendChild(b);
    privateMessages.appendChild(row);
}

document.getElementById('privateSend').onclick = () => {
    const text = privateInput.value.trim();
    if(!text || !currentPrivateWith) return;
    const key = chatId(username, currentPrivateWith);
    db.ref(`privateChats/${key}`).push({ name: username, text, time: Date.now() });
    // Update target's unread count
    db.ref(`unread/${currentPrivateWith}/${username}`).transaction(c => (c || 0) + 1);
    privateInput.value = '';
};

document.getElementById('closePrivate').onclick = () => { 
    privatePopup.style.display = 'none'; 
    currentPrivateWith = null; 
};

bellBtn.onclick = () => { panelEl.classList.toggle('open'); refreshPanelList(); };
document.getElementById('panelClose').onclick = () => panelEl.classList.remove('open');

// --- INITIALIZATION ---

function startApp(name) {
    username = name;
    localStorage.setItem('guestName', name);
    document.getElementById('loginWrap').style.display = 'none';
    db.ref(`status/${username}`).set(true);
    db.ref(`status/${username}`).onDisconnect().remove();
    
    updateBellBadge();
    startGlobalPrivateListener();
    startGroupChat();
}

function startGroupChat() {
    db.ref('messages').limitToLast(30).on('child_added', snap => {
        const data = snap.val();
        const row = document.createElement('div');
        row.className = 'msg-row' + (data.name === username ? ' self' : '');
        row.innerHTML = `<div class="avatar">${data.name[0]}</div><div><div class="meta">${data.name}</div><div class="bubble">${data.text}</div></div>`;
        document.getElementById('messages').appendChild(row);
        scrollToBottom(document.getElementById('messages'));
    });
}

document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('messageInput').value.trim();
    if(text) {
        db.ref('messages').push({ name: username, text, time: Date.now() });
        document.getElementById('messageInput').value = '';
    }
};

document.getElementById('joinBtn').onclick = () => {
    const n = document.getElementById('nameInput').value.trim();
    if(n) startApp(n);
};

if(username) startApp(username);

function scrollToBottom(el){ setTimeout(() => el.scrollTop = el.scrollHeight, 50); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Settings Toggles
document.getElementById('settingsBtn').onclick = () => {
    const p = document.getElementById('settingsPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
};
</script>
</body>
</html>
