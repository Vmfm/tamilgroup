<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Click Race</title>
    <style>
        body { background: #111b21; color: white; font-family: sans-serif; text-align: center; }
        #game-container { margin-top: 50px; }
        .player-row { margin: 10px; padding: 10px; background: #202c33; border-radius: 8px; }
        .progress-bar { height: 20px; background: #25d366; width: 0%; transition: width 0.2s; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 20px; background: #25d366; border: none; border-radius: 50px; color: white; cursor: pointer; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <h1>Multiplayer Click Race</h1>
    <p>First to 20 clicks wins!</p>
    
    <div id="game-container">
        <div id="player-list"></div>
        <br>
        <button id="clickBtn">CLICK ME!</button>
        <button onclick="resetGame()" style="background:#ff3b30; margin-left:10px;">Reset</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const username = localStorage.getItem('guestName') || 'Anonymous';
        const gameRef = db.ref('games/clickRace');

        const clickBtn = document.getElementById('clickBtn');
        const playerList = document.getElementById('player-list');

        // 1. Listen for updates from all players
        gameRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            playerList.innerHTML = '';
            
            Object.keys(data).forEach(player => {
                const score = data[player];
                const percentage = (score / 20) * 100;
                
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <span>${player}</span> <span>${score}/20</span>
                    </div>
                    <div style="background:#2a3942; width:100%; border-radius:10px; margin-top:5px;">
                        <div class="progress-bar" style="width: ${percentage}%"></div>
                    </div>
                `;
                playerList.appendChild(row);

                if (score >= 20) {
                    alert(player + " WON THE GAME!");
                    resetGame();
                }
            });
        });

        // 2. Handle Clicking
        clickBtn.onclick = () => {
            gameRef.child(username).transaction((currentScore) => {
                return (currentScore || 0) + 1;
            });
        };

        function resetGame() {
            gameRef.set({});
        }
    </script>
</body>
</html>
