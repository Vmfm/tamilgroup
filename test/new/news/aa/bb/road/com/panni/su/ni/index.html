<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhatsApp Full Chat - Live</title>
<style>
:root{--bg:#111b21;--panel:#202c33;--accent:#25d366;--muted:#97a4ab;--online:#25d366;--offline:#8696a0}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#e9edef;font-family:Arial,system-ui;min-height:100vh;display:flex;flex-direction:column}

/* --- LIVE TV UI --- */
#liveBtn { background: #ff3b30; color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 800; animation: livePulse 2s infinite; border: none; }
@keyframes livePulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

#livePop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10005; display: none; align-items: center; justify-content: center; }
.liveChoiceCard { background: #0b141a; padding: 25px; border-radius: 16px; width: 300px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
.liveChoiceBtn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
.btnStart { background: var(--accent); color: #fff; }
.btnWatch { background: #2a3942; color: #fff; }

#liveStreamLayer { position: fixed; inset: 0; background: #000; z-index: 10010; display: none; flex-direction: column; }
#liveVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
.liveOverlay { position: absolute; inset: 0; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
.liveTopInfo { display: flex; align-items: center; justify-content: space-between; pointer-events: auto; }
.liveUserTag { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.2); }
.liveAvatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
.viewCount { background: rgba(255,59,48,0.8); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
.liveBottomBtns { display: flex; justify-content: flex-end; gap: 15px; pointer-events: auto; }
.liveActionBtn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); }

/* --- EXISTING UI FIXES --- */
#loader-wrapper { position: fixed; inset: 0; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
.loader-wheel { width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #ffeb3b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

#app{max-width:1100px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;position:relative;transition:transform .28s ease}
#topBar{padding:8px 12px;background:#0b141a;display:flex;align-items:center;gap:12px;z-index:5}
#title{font-weight:600;display:flex;align-items:center;gap:10px}
#onlineCount { background: rgba(37, 211, 102, 0.1); color: var(--accent); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid rgba(37, 211, 102, 0.3); font-weight: 600; }

/* ... Rest of existing styles (Panel, Messages, etc.) ... */
#messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#071215}
.msg-row{display:flex;align-items:flex-end;max-width:80%}
.msg-row.self{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 8px;overflow:hidden}
.bubble{background:var(--panel);padding:8px 12px;border-radius:12px;font-size:14px;word-break:break-word}
.msg-row.self .bubble{background:#005c4b}
#inputBar{display:flex;padding:10px;background:var(--panel);align-items:center;gap:8px}
#messageInput{flex:1;padding:10px;border-radius:22px;border:0;background:#2a3942;color:#fff;outline:none}
#sendBtn{width:44px;height:44px;border-radius:50%;border:0;background:var(--accent);color:#fff;cursor:pointer}
#loginWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:999}
#loginCard{background:#0b141a;padding:22px;border-radius:16px;display:flex;flex-direction:column;gap:12px;min-width:320px}
#loginCard input, #loginCard select{padding:12px;border-radius:10px;border:0;background:#162027;color:#fff}
#loginCard button{padding:12px;border-radius:10px;border:0;background:var(--accent);color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<div id="loader-wrapper"><div class="loader-wheel"></div><div class="loader-text">Loading Group Chat...</div></div>

<!-- LIVE POPUP -->
<div id="livePop">
    <div class="liveChoiceCard">
        <h3 style="margin-top:0">Live Stream</h3>
        <button class="liveChoiceBtn btnStart" id="startLiveBtn">Start Live</button>
        <button class="liveChoiceBtn btnWatch" id="watchLiveBtn">Watch Live</button>
        <button onclick="document.getElementById('livePop').style.display='none'" style="background:none;border:none;color:var(--muted);cursor:pointer">Close</button>
    </div>
</div>

<!-- LIVE STREAM SCREEN -->
<div id="liveStreamLayer">
    <video id="liveVideo" autoplay playsinline></video>
    <div class="liveOverlay">
        <div class="liveTopInfo">
            <div class="liveUserTag">
                <img id="liveHostImg" class="liveAvatar" src="">
                <span id="liveHostName">Host</span>
            </div>
            <div class="viewCount">👁 <span id="liveVCount">0</span></div>
        </div>
        <div class="liveBottomBtns">
            <button class="liveActionBtn" id="liveFsBtn">⛶</button>
            <button class="liveActionBtn" id="closeLiveBtn" style="background:#ff3b30">✕</button>
        </div>
    </div>
</div>

<div id="app">
    <div id="topBar">
        <div id="title">Group Chat</div>
        <button id="liveBtn">LIVE</button>
        <div style="flex:1"></div>
        <div id="onlineCount">0 online</div>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
        <input id="messageInput" placeholder="Type a message" autocomplete="off"/>
        <button id="sendBtn">➤</button>
    </div>
</div>

<!-- LOGIN -->
<div id="loginWrap">
    <div id="loginCard">
        <div style="font-weight:700;color:#fff;font-size:18px;text-align:center">Welcome</div>
        <input id="nameInput" placeholder="Enter your name" />
        <select id="ageSelect">
            <option value="18+">18+</option>
            <option value="Under 18">Under 18</option>
        </select>
        <input type="file" id="loginPhotoInput" accept="image/*" />
        <button id="joinBtn">Join Chat</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem('guestName') || '';
let profileImage = localStorage.getItem('profileImage') || '';
let userAge = localStorage.getItem('userAge') || 'Under 18';
let localStream = null;
let peerConn = null;
const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

// UI Elements
const liveBtn = document.getElementById('liveBtn');
const livePop = document.getElementById('livePop');
const startLiveBtn = document.getElementById('startLiveBtn');
const watchLiveBtn = document.getElementById('watchLiveBtn');
const liveStreamLayer = document.getElementById('liveStreamLayer');
const liveVideo = document.getElementById('liveVideo');
const liveHostName = document.getElementById('liveHostName');
const liveHostImg = document.getElementById('liveHostImg');
const liveVCount = document.getElementById('liveVCount');

window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('loader-wrapper').style.display = 'none', 1000);
});

if(!username) {
    document.getElementById('loginWrap').style.display = 'flex';
} else {
    startApp();
}

document.getElementById('joinBtn').onclick = () => {
    const n = document.getElementById('nameInput').value.trim();
    if(!n) return alert("Enter name");
    username = n;
    userAge = document.getElementById('ageSelect').value;
    const file = document.getElementById('loginPhotoInput').files[0];
    
    if(file && userAge === '18+') {
        const reader = new FileReader();
        reader.onload = (e) => { 
            profileImage = e.target.result; 
            saveAndStart();
        };
        reader.readAsDataURL(file);
    } else {
        saveAndStart();
    }
};

function saveAndStart() {
    localStorage.setItem('guestName', username);
    localStorage.setItem('userAge', userAge);
    localStorage.setItem('profileImage', profileImage);
    document.getElementById('loginWrap').style.display = 'none';
    startApp();
}

function startApp() {
    db.ref(`status/${username}`).set(true);
    db.ref(`status/${username}`).onDisconnect().remove();
    db.ref(`profiles/${username}`).update({ name: username, profileImage, age: userAge });
    
    startListeners();
}

function startListeners() {
    db.ref('messages').limitToLast(50).on('child_added', snap => {
        renderMsg(snap.val());
    });
    
    db.ref('status').on('value', snap => {
        document.getElementById('onlineCount').textContent = `${snap.numChildren()} online`;
    });

    // Watch for active lives
    db.ref('activeLive').on('value', snap => {
        const live = snap.val();
        liveBtn.style.background = live ? "#ff3b30" : "#2a3942";
        liveBtn.textContent = live ? "● LIVE" : "LIVE";
    });
}

function renderMsg(data) {
    const messagesEl = document.getElementById('messages');
    const isSelf = data.name === username;
    const row = document.createElement('div'); row.className = `msg-row ${isSelf?'self':''}`;
    row.innerHTML = `
        <div class="avatar">${data.profileImage ? `<img src="${data.profileImage}" style="width:100%">` : data.name[0]}</div>
        <div class="bubble">${data.text}</div>
    `;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('messageInput').value.trim();
    if(!text) return;
    db.ref('messages').push({ name: username, profileImage, text, time: Date.now() });
    document.getElementById('messageInput').value = '';
};

// --- LIVE LOGIC ---
liveBtn.onclick = () => livePop.style.display = 'flex';

startLiveBtn.onclick = async () => {
    if(userAge !== '18+') return alert("Only 18+ can start live streams.");
    livePop.style.display = 'none';
    liveStreamLayer.style.display = 'flex';
    
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        liveVideo.srcObject = localStream;
        liveHostName.textContent = username;
        liveHostImg.src = profileImage || '';
        
        // Signal to others
        db.ref('activeLive').set({ 
            host: username, 
            img: profileImage, 
            startTime: Date.now() 
        });
        db.ref('activeLive').onDisconnect().remove();
        
        // Handle viewers
        db.ref('liveViewers').on('value', s => {
            liveVCount.textContent = s.numChildren();
        });

        setupLiveSignaling(true);
    } catch(e) {
        alert("Camera access denied");
        closeLive();
    }
};

watchLiveBtn.onclick = async () => {
    const snap = await db.ref('activeLive').once('value');
    if(!snap.exists()) return alert("No active live stream");
    const live = snap.val();
    
    livePop.style.display = 'none';
    liveStreamLayer.style.display = 'flex';
    liveHostName.textContent = live.host;
    liveHostImg.src = live.img || '';

    // Join view count
    const viewRef = db.ref(`liveViewers/${username}`).set(true);
    db.ref(`liveViewers/${username}`).onDisconnect().remove();
    
    db.ref('liveViewers').on('value', s => {
        liveVCount.textContent = s.numChildren();
    });

    setupLiveSignaling(false);
};

async function setupLiveSignaling(isHost) {
    peerConn = new RTCPeerConnection(rtcConfig);
    
    if(isHost) {
        localStream.getTracks().forEach(track => peerConn.addTrack(track, localStream));
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        db.ref('liveSignal').set({ sdp: offer.sdp, type: offer.type });
    } else {
        db.ref('liveSignal').on('value', async s => {
            const data = s.val();
            if(data && data.type === 'offer') {
                await peerConn.setRemoteDescription(new RTCSessionDescription(data));
                const answer = await peerConn.createAnswer();
                await peerConn.setLocalDescription(answer);
                db.ref('liveSignal').update({ answer: { sdp: answer.sdp, type: answer.type } });
            }
        });
        
        peerConn.ontrack = (e) => {
            liveVideo.srcObject = e.streams[0];
        };
    }

    peerConn.onicecandidate = (e) => {
        if(e.candidate) db.ref(`liveIce/${username}`).push(e.candidate.toJSON());
    };
}

document.getElementById('closeLiveBtn').onclick = closeLive;
function closeLive() {
    if(localStream) localStream.getTracks().forEach(t => t.stop());
    if(peerConn) peerConn.close();
    liveStreamLayer.style.display = 'none';
    db.ref('activeLive').remove();
    db.ref('liveViewers/' + username).remove();
    db.ref('liveSignal').remove();
}

document.getElementById('liveFsBtn').onclick = () => {
    if(!document.fullscreenElement) liveStreamLayer.requestFullscreen();
    else document.exitFullscreen();
};
</script>
</body>
</html>
