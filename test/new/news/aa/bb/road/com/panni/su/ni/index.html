<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Chat Admin Panel - Pro</title>
    <style>
        :root {
            --bg: #0b141a;
            --card: #111b21;
            --accent: #25d366;
            --danger: #ff3b30;
            --warning: #ff9500;
            --text: #e9edef;
            --muted: #8696a0;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        header {
            background: var(--card);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { padding: 10px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 16px; margin: 0 0 15px 0; color: var(--accent); display: flex; justify-content: space-between; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--muted); padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; margin-right: 4px; }
        .btn-safe { background: var(--accent); color: white; }
        .btn-warn { background: var(--warning); color: white; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--accent); }
        .offline { background: #555; }

        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: var(--card); padding: 30px; border-radius: 16px; text-align: center; width: 85%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #2a3942; background: #111b21; color: white; box-sizing: border-box; }
        
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
            .btn-group { display: flex; flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-box">
        <h3>Admin Secure Login</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn btn-safe" style="width:100%; padding: 12px;" onclick="attemptLogin()">Access Console</button>
    </div>
</div>

<header>
    <div style="font-weight: 700;">🛡️ Admin Panel</div>
    <button class="btn btn-warn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <div class="grid">
        <div class="card" style="grid-column: span 2;">
            <h2>User Management <small id="auto-status" style="font-size: 10px; color: var(--muted);"></small></h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Status</th>
                            <th class="hide-mobile">Last Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Recent Reports</h2>
            <div id="reportList"></div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h2>Global Message Log</h2>
        <div id="msgLogs" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- Link to your existing config -->
<script src="https://vmfm.github.io/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

<script>
    const CONFIG = {
        pass: "admin123", // Set your password[cite: 1]
        cleanupDays: 20, 
        storageKey: "admin_session"
    };

    window.onload = () => {
        if(localStorage.getItem(CONFIG.storageKey) === "true") showPanel();
    };

    function attemptLogin() {
        if(document.getElementById('adminPass').value === CONFIG.pass) {
            localStorage.setItem(CONFIG.storageKey, "true");
            showPanel();
        } else {
            alert("Wrong Password");
        }
    }

    function logout() {
        localStorage.removeItem(CONFIG.storageKey);
        location.reload();
    }

    function showPanel() {
        document.getElementById('auth-overlay').style.display = 'none';
        startDashboard();
    }

    function startDashboard() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        autoCleanup(db); // Run 20-day auto removal[cite: 1]
        loadUsers(db);
        loadReports(db);
        loadMessages(db);
    }

    // AUTO REMOVE USERS INACTIVE FOR 20 DAYS[cite: 1]
    function autoCleanup(db) {
        const now = Date.now();
        const limit = CONFIG.cleanupDays * 24 * 60 * 60 * 1000;
        let count = 0;

        db.ref('profiles').once('value', snap => {
            const users = snap.val() || {};
            Object.keys(users).forEach(u => {
                const lastSeen = users[u].lastSeen || 0;
                if(now - lastSeen > limit) {
                    db.ref(`profiles/${u}`).remove();
                    db.ref(`status/${u}`).remove();
                    count++;
                }
            });
            document.getElementById('auto-status').innerText = `(Auto-cleaned: ${count} users)`;
        });
    }

    function loadUsers(db) {
        db.ref('profiles').on('value', snap => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            const users = snap.val() || {};
            
            Object.keys(users).forEach(u => {
                const data = users[u];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${u}</b></td>
                    <td><span class="status-dot ${data.online ? 'online' : 'offline'}"></span></td>
                    <td class="hide-mobile">${data.lastSeen ? new Date(data.lastSeen).toLocaleDateString() : 'Never'}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-danger" onclick="manualRemove('${u}')">Remove</button>
                            <button class="btn ${data.banned ? 'btn-safe' : 'btn-warn'}" onclick="toggleBan('${u}', ${data.banned})">
                                ${data.banned ? 'Unban' : 'Ban'}
                            </button>
                        </div>
                    </td>
                `;
                list.appendChild(tr);
            });
        });
    }

    // MANUAL REMOVE OPTION[cite: 1]
    function manualRemove(username) {
        if(confirm(`Permanently delete ${username} from database?`)) {
            const db = firebase.database();
            db.ref(`profiles/${username}`).remove();
            db.ref(`status/${username}`).remove();
        }
    }

    function toggleBan(u, status) {
        firebase.database().ref(`profiles/${u}`).update({ banned: !status });
    }

    function loadReports(db) {
        db.ref('reports').limitToLast(5).on('value', snap => {
            const container = document.getElementById('reportList');
            container.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                const r = data[id];
                const div = document.createElement('div');
                div.style.marginBottom = "10px";
                div.innerHTML = `<small>🚩 <b>${r.reported}</b> by ${r.by}</small>`;
                container.prepend(div);
            });
        });
    }

    function loadMessages(db) {
        db.ref('messages').limitToLast(30).on('value', snap => {
            const container = document.getElementById('msgLogs');
            container.innerHTML = '';
            const msgs = snap.val() || {};
            Object.keys(msgs).forEach(id => {
                const m = msgs[id];
                const div = document.createElement('div');
                div.style.padding = "10px";
                div.style.borderBottom = "1px solid #2a3942";
                div.style.display = "flex";
                div.style.justifyContent = "space-between";
                div.innerHTML = `
                    <div><b>${m.name}:</b> ${m.text || 'Media'}</div>
                    <button class="btn btn-danger" onclick="deleteMsg('${id}')">Del</button>
                `;
                container.prepend(div);
            });
        });
    }

    function deleteMsg(id) {
        if(confirm("Delete message?")) firebase.database().ref(`messages/${id}`).remove();
    }
</script>
</body>
</html>
