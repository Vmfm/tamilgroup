<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Chat Admin Panel</title>
    <style>
        :root {
            --bg: #0b141a;
            --card: #111b21;
            --accent: #25d366;
            --danger: #ff3b30;
            --text: #e9edef;
            --muted: #8696a0;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        header {
            background: var(--card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 18px; margin-top: 0; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: var(--muted); padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Controls */
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.8; }
        .btn-safe { background: var(--accent); color: white; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--accent); }
        .offline { background: #555; }
        
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: var(--card); padding: 30px; border-radius: 16px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a3942; background: #111b21; color: white; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-box">
        <h3>Admin Login</h3>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button class="btn btn-safe" style="width:100%" onclick="checkPass()">Login</button>
    </div>
</div>

<header>
    <div style="font-weight: 700; font-size: 20px;">🛡️ Console Admin</div>
    <div id="adminName" style="color: var(--muted); font-size: 14px;">Master Access</div>
</header>

<div class="container">
    <div class="grid">
        <!-- User Management -->
        <div class="card" style="grid-column: span 2;">
            <h2>User Management</h2>
            <table id="userTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Status</th>
                        <th>Last Seen</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>

        <!-- Reports -->
        <div class="card">
            <h2>Recent Reports</h2>
            <div id="reportList" style="font-size: 13px;"></div>
        </div>
    </div>

    <!-- Message Logs -->
    <div class="card" style="margin-top: 20px;">
        <h2>Global Message Moderation (Last 50)</h2>
        <div id="msgLogs" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- Point to your existing config file -->
<script src="/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

<script>
    // 1. SIMPLE PASSWORD CHECK (Change 'admin123' to your desired password)
    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "admin123") {
            document.getElementById('auth-overlay').style.display = 'none';
            initAdmin();
        } else {
            alert("Incorrect Password");
        }
    }

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initAdmin() {
        loadUsers();
        loadReports();
        loadMessages();
    }

    function loadUsers() {
        db.ref('profiles').on('value', snap => {
            const users = snap.val() || {};
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            Object.keys(users).forEach(u => {
                const data = users[u];
                const isBanned = data.banned === true;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${u}</b></td>
                    <td><span class="status-dot ${data.online ? 'online' : 'offline'}"></span> ${data.online ? 'Online' : 'Offline'}</td>
                    <td>${data.lastSeen ? new Date(data.lastSeen).toLocaleDateString() : 'N/A'}</td>
                    <td>
                        <button class="btn ${isBanned ? 'btn-safe' : 'btn-danger'}" onclick="toggleBan('${u}', ${isBanned})">
                            ${isBanned ? 'Unban' : 'Ban User'}
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
        });
    }

    function toggleBan(username, currentStatus) {
        if(confirm(`Are you sure you want to ${currentStatus ? 'Unban' : 'Ban'} ${username}?`)) {
            db.ref(`profiles/${username}`).update({ banned: !currentStatus });
            // If banning, also remove their online status to kick them out
            if(!currentStatus) db.ref(`status/${username}`).remove();
        }
    }

    function loadReports() {
        db.ref('reports').limitToLast(10).on('value', snap => {
            const reports = snap.val() || {};
            const container = document.getElementById('reportList');
            container.innerHTML = '';
            Object.keys(reports).forEach(id => {
                const r = reports[id];
                const div = document.createElement('div');
                div.style.padding = "10px 0";
                div.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
                div.innerHTML = `⚠️ <b>${r.reported}</b> reported by ${r.by} <br> <small>${new Date(r.time).toLocaleString()}</small>`;
                container.prepend(div);
            });
        });
    }

    function loadMessages() {
        db.ref('messages').limitToLast(50).on('value', snap => {
            const msgs = snap.val() || {};
            const container = document.getElementById('msgLogs');
            container.innerHTML = '';
            Object.keys(msgs).forEach(id => {
                const m = msgs[id];
                const div = document.createElement('div');
                div.style.display = "flex";
                div.style.justifyContent = "space-between";
                div.style.padding = "8px";
                div.style.background = "rgba(255,255,255,0.02)";
                div.style.marginBottom = "4px";
                div.style.borderRadius = "4px";
                
                div.innerHTML = `
                    <div>
                        <b style="color:var(--accent)">${m.name}:</b> ${m.text || (m.sticker ? '[Sticker]' : '[Media]')}
                        <div style="font-size:10px; color:var(--muted)">${new Date(m.time).toLocaleString()}</div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteMsg('${id}')">Delete</button>
                `;
                container.prepend(div);
            });
        });
    }

    function deleteMsg(id) {
        if(confirm("Delete this message for everyone?")) {
            db.ref(`messages/${id}`).remove();
        }
    }
</script>

</body>
</html>
