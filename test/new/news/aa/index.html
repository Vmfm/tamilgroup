<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Image Example</title>
    <style>
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #content { display: none; }
    </style>
</head>
<body>
    <div id="loader">
        <img src="https://media2.giphy.com/media/tz8mn1B6x877oQSRoB/giphy.gif?cid=6c09b9525mvckrkbgvie8cj749lfd2xubogxa8yvpwc5eqak&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=s" alt="Loading..." />
    </div>
    <script>
        window.onload = function () {
            setTimeout(() => {
                document.getElementById("loader").style.display = "none";
                document.getElementById("content").style.display = "block";
            }, 2000);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhatsApp Full Chat</title>
<style>
:root{--bg:#111b21;--panel:#202c33;--accent:#25d366;--muted:#97a4ab;--blue:#53bdeb}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#e9edef;font-family:Arial,system-ui;min-height:100vh;display:flex;flex-direction:column; user-select: none; -webkit-user-select: none;}
#app{max-width:1100px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;position:relative;}
#topBar{padding:8px 12px;background:#0b141a;display:flex;align-items:center;gap:12px;z-index:5}
#notifWrap{display:flex;align-items:center;gap:8px}
.bell{position:relative;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.04)}
.badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:12px;background:#ff3b30;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0 6px;box-shadow:0 2px 6px rgba(0,0,0,.6)}
#panel{position:fixed;right:0;top:0;height:100vh;width:320px;background:#081214;transform:translateX(100%);transition:transform .28s ease;z-index:2000;display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
.panelHeader{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:center;justify-content:space-between}
.panelList{padding:8px;overflow:auto;flex:1}
.panelItem{padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
#messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#071215}
.msg-row{display:flex;align-items:flex-end;max-width:85%;position:relative}
.msg-row.self{align-self:flex-end;flex-direction:row-reverse}
.bubble{background:var(--panel);padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.3;word-break:break-word;position:relative;}
.msg-row.self .bubble{background:#005c4b}
.meta{font-size:11px;color:var(--blue);margin-bottom:4px}
.time{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:3px}
.status-tick{font-size:12px}
.status-tick.read{color:var(--blue)}
.reaction-badge{position:absolute;bottom:-10px;right:5px;background:#202c33;border-radius:10px;padding:1px 4px;font-size:11px;border:1px solid rgba(255,255,255,0.1)}
#inputBar{display:flex;padding:10px;background:var(--panel);align-items:center;gap:8px}
#messageInput{flex:1;padding:10px;border-radius:22px;border:0;background:#2a3942;color:#fff;outline:none}
#sendBtn{width:44px;height:44px;border-radius:50%;border:0;background:var(--accent);color:#fff;cursor:pointer}
#settingsPanel{position:absolute;right:10px;top:55px;background:#182229;border:1px solid rgba(255,255,255,0.1);padding:15px;border-radius:12px;display:none;z-index:1000;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.settingRow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.toggleBtn{width:44px;height:22px;border-radius:12px;background:#2a3942;position:relative;cursor:pointer;transition:background .2s}
.toggleKnob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
#emojiBar{position:fixed;background:#202c33;padding:5px;border-radius:20px;display:none;z-index:3000;box-shadow:0 4px 15px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);gap:5px;max-width:90vw;overflow-x:auto}
.emoji-item{cursor:pointer;font-size:22px;padding:2px}
#privatePopup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:2500}
.card{background:#0b141a;padding:15px;border-radius:15px;width:95%;max-width:500px;display:flex;flex-direction:column;max-height:85%}
#privateMessages{flex:1;overflow:auto;padding:10px;background:#071215;border-radius:10px;display:flex;flex-direction:column;gap:8px}
#loginWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:5000}
#loginCard{background:#0b141a;padding:25px;border-radius:15px;width:300px;text-align:center}
#loginCard input{width:100%;padding:12px;margin:15px 0;border-radius:8px;border:none;background:#2a3942;color:#fff}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:30px;background:#2a3942;color:#fff;padding:10px 20px;border-radius:20px;z-index:6000;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="emojiBar"></div>
<div id="deleteModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center;">
    <div style="background:#202c33; padding:20px; border-radius:12px; width:280px; text-align:center">
        <p>Delete message for everyone?</p>
        <div style="display:flex; justify-content:space-around; margin-top:15px">
            <button id="cancelDel" style="background:none; border:none; color:var(--accent); font-weight:700">CANCEL</button>
            <button id="confirmDel" style="background:none; border:none; color:var(--accent); font-weight:700">DELETE</button>
        </div>
    </div>
</div>

<div id="panel"><div class="panelHeader"><span style="font-weight:700">Private Chats</span><button id="panelClose" style="background:none;border:none;color:var(--accent);font-size:20px">✕</button></div><div class="panelList" id="panelList"></div></div>

<div id="app">
    <div id="topBar">
        <div id="title">Tamil Group</div>
        <div style="flex:1"></div>
        <div id="notifWrap">
            <div class="bell" id="bellBtn">🔔<div class="badge" id="bellBadge" style="display:none">0</div></div>
            <div style="position:relative" id="settingsWrapper">
                <button id="settingsBtn" style="background:none; border:none; cursor:pointer; font-size:20px">⚙️</button>
                <div id="settingsPanel">
                    <div class="settingRow"><span>Message Tone</span><div class="toggleBtn" id="toggleTone"><div class="toggleKnob" id="toggleToneKnob"></div></div></div>
                    <button id="logoutBtn" style="width:100%; background:#ff3b30; color:#fff; border:none; padding:10px; border-radius:8px; margin-top:10px; cursor:pointer">Logout</button>
                </div>
            </div>
        </div>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
        <input id="messageInput" placeholder="Type a message" autocomplete="off"/>
        <button id="sendBtn">➤</button>
    </div>
</div>

<div id="privatePopup">
    <div class="card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
            <button id="closePrivate" style="background:none; border:none; color:var(--accent); font-size:24px">⬅</button>
            <span id="privateTitle" style="font-weight:700"></span>
        </div>
        <div id="privateMessages"></div>
        <div style="display:flex; gap:10px; margin-top:10px">
            <input id="privateInput" style="flex:1; padding:12px; border-radius:20px; border:none; background:#2a3942; color:#fff" placeholder="Type message..."/>
            <button id="privateSend" style="background:var(--accent); border:none; color:#fff; width:45px; height:45px; border-radius:50%">➤</button>
        </div>
    </div>
</div>

<div id="loginWrap"><div id="loginCard"><h3>Welcome</h3><input id="nameInput" placeholder="Enter your name" /><button id="joinBtn" style="width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px">Join Chat</button></div></div>
<div id="toast"></div>
<audio id="dingAudio" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="/tamilgroup/test/new/news/aa/bb/road/com/config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const emojiList = ["😀","😃","😄","😁","😆","😅","😂","🤣","☺️","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋"];
let username = localStorage.getItem('guestName') || '';
let currentDeleteAction = null;
let settings = JSON.parse(localStorage.getItem('chat_settings') || '{"messageTone":true}');
let privateChatWith = null;

// --- Click Outside to Close Logic ---
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const settingsWrapper = document.getElementById('settingsWrapper');

settingsBtn.onclick = (e) => {
    e.stopPropagation();
    settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
};

// Close when touching screen anywhere else
window.addEventListener('click', (e) => {
    if (!settingsWrapper.contains(e.target)) {
        settingsPanel.style.display = 'none';
    }
});

// --- Emoji Logic ---
const emojiBar = document.getElementById('emojiBar');
emojiList.forEach(emoji => {
    const span = document.createElement('span'); span.className = 'emoji-item'; span.textContent = emoji;
    span.onclick = () => { reactToMsg(window.lastReactTarget, emoji); hideEmojiBar(); };
    emojiBar.appendChild(span);
});

function showEmojiBar(x, y, target) {
    window.lastReactTarget = target;
    emojiBar.style.left = Math.min(x, window.innerWidth - 220) + 'px';
    emojiBar.style.top = (y - 55) + 'px';
    emojiBar.style.display = 'flex';
}
function hideEmojiBar() { emojiBar.style.display = 'none'; }

function addLongPress(el, target) {
    let pressTimer;
    el.addEventListener('touchstart', (e) => { pressTimer = setTimeout(() => { showEmojiBar(e.touches[0].clientX, e.touches[0].clientY, target); }, 600); });
    el.addEventListener('mousedown', (e) => { pressTimer = setTimeout(() => { showEmojiBar(e.clientX, e.clientY, target); }, 600); });
    el.addEventListener('mouseup', () => clearTimeout(pressTimer));
    el.addEventListener('touchend', () => clearTimeout(pressTimer));
}

function reactToMsg(target, emoji) {
    if(target.type === 'group') db.ref(`messages/${target.id}/reaction`).set(emoji);
    else db.ref(`privateChats/${chatId(username, privateChatWith)}/${target.id}/reaction`).set(emoji);
}

// --- Chat Core ---
function playTing() { if(settings.messageTone) { try { document.getElementById('dingAudio').play(); } catch(e){} } }
function chatId(a,b){ return [a,b].sort().join('_'); }
function formatTime(ms){ const d=new Date(ms); return d.getHours()%12||12 + ":" + d.getMinutes().toString().padStart(2,'0') + (d.getHours()>=12?' PM':' AM'); }
function scrollToBottom(el){ setTimeout(()=> el.scrollTop = el.scrollHeight, 100); }

if(!username) {
    document.getElementById('joinBtn').onclick = () => {
        const n = document.getElementById('nameInput').value.trim();
        if(n) { username = n; localStorage.setItem('guestName', n); document.getElementById('loginWrap').style.display='none'; initApp(); }
    };
} else {
    document.getElementById('loginWrap').style.display = 'none';
    initApp();
}

function initApp() {
    db.ref(`status/${username}`).set(true).then(() => db.ref(`status/${username}`).onDisconnect().remove());
    startGroup();
    watchUnread();
}

function startGroup() {
    const messagesEl = document.getElementById('messages');
    db.ref('messages').limitToLast(50).on('child_added', snap => {
        renderMsg(messagesEl, snap.val(), snap.key, 'group');
        if(snap.val().name !== username) playTing();
    });
    db.ref('messages').on('child_changed', snap => {
        const el = document.querySelector(`[data-key="${snap.key}"] .reaction-badge`);
        if(el) el.textContent = snap.val().reaction || '';
    });
}

function watchUnread() {
    db.ref(`unread/${username}`).on('value', snap => {
        const counts = snap.val() || {};
        const total = Object.values(counts).reduce((a,b)=>a+b,0);
        document.getElementById('bellBadge').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('bellBadge').textContent = total;
        refreshPanelList(counts);
    });
}

async function refreshPanelList(unread) {
    const listEl = document.getElementById('panelList'); listEl.innerHTML = '';
    const chats = (await db.ref('privateChats').once('value')).val() || {};
    Object.keys(chats).forEach(k => {
        if(k.includes(username)) {
            const other = k.split('_').find(x=>x!==username);
            const item = document.createElement('div'); item.className = 'panelItem';
            item.innerHTML = `<span style="flex:1">${other}</span>` + (unread[other]?`<span style="background:#ff3b30;padding:2px 8px;border-radius:10px;font-size:12px">${unread[other]}</span>`:'');
            item.onclick = () => openPrivate(other); listEl.appendChild(item);
        }
    });
}

function openPrivate(other) {
    privateChatWith = other;
    document.getElementById('privatePopup').style.display = 'flex';
    document.getElementById('privateTitle').textContent = other;
    document.getElementById('panel').classList.remove('open');
    const msgEl = document.getElementById('privateMessages'); msgEl.innerHTML = '';
    const key = chatId(username, other);
    db.ref(`unread/${username}/${other}`).set(0);
    db.ref(`privateChats/${key}`).off();
    db.ref(`privateChats/${key}`).on('child_added', snap => {
        renderMsg(msgEl, snap.val(), snap.key, 'private');
        if(snap.val().name === other && !snap.val().read) db.ref(`privateChats/${key}/${snap.key}`).update({read:true});
    });
    db.ref(`privateChats/${key}`).on('child_changed', snap => {
        const row = document.querySelector(`[data-msgid="${snap.key}"]`);
        if(row) {
            const tick = row.querySelector('.status-tick');
            if(tick && snap.val().read) tick.classList.add('read');
            const react = row.querySelector('.reaction-badge');
            if(react) react.textContent = snap.val().reaction || '';
        }
    });
}

function renderMsg(container, d, id, type) {
    const isSelf = d.name === username;
    const row = document.createElement('div');
    row.className = 'msg-row' + (isSelf ? ' self' : '');
    if(type==='group') row.dataset.key = id; else row.dataset.msgid = id;

    const tick = (type==='private' && isSelf) ? `<span class="status-tick ${d.read?'read':''}">✓✓</span>` : '';
    
    row.innerHTML = `
        <div class="bubble">
            ${type==='group' && !isSelf ? `<div class="meta">${d.name}</div>` : ''}
            <div>${d.text}</div>
            <div class="time">${formatTime(d.time)} ${tick}</div>
            <div class="reaction-badge">${d.reaction || ''}</div>
        </div>
    `;

    const bubble = row.querySelector('.bubble');
    addLongPress(bubble, {type, id});
    if(isSelf) bubble.ondblclick = () => { currentDeleteAction = () => { if(type==='group') db.ref(`messages/${id}`).remove(); else db.ref(`privateChats/${chatId(username, privateChatWith)}/${id}`).remove(); }; document.getElementById('deleteModal').style.display='flex'; };
    else if(type==='group') bubble.onclick = () => openPrivate(d.name);

    container.appendChild(row);
    scrollToBottom(container);
}

document.getElementById('sendBtn').onclick = () => {
    const val = document.getElementById('messageInput').value.trim();
    if(val) { db.ref('messages').push({ name:username, text:val, time:Date.now() }); document.getElementById('messageInput').value=''; }
};

document.getElementById('privateSend').onclick = () => {
    const val = document.getElementById('privateInput').value.trim();
    if(val && privateChatWith) {
        db.ref(`privateChats/${chatId(username, privateChatWith)}`).push({ name:username, text:val, time:Date.now(), read:false });
        db.ref(`unread/${privateChatWith}/${username}`).transaction(c => (c||0)+1);
        document.getElementById('privateInput').value = '';
    }
};

// UI Toggles
document.getElementById('toggleTone').onclick = () => {
    settings.messageTone = !settings.messageTone;
    localStorage.setItem('chat_settings', JSON.stringify(settings));
    document.getElementById('toggleToneKnob').style.left = settings.messageTone ? '23px' : '2px';
    document.getElementById('toggleTone').style.background = settings.messageTone ? '#25d366' : '#2a3942';
};
document.getElementById('toggleToneKnob').style.left = settings.messageTone ? '23px' : '2px';
document.getElementById('toggleTone').style.background = settings.messageTone ? '#25d366' : '#2a3942';

document.getElementById('bellBtn').onclick = () => document.getElementById('panel').classList.add('open');
document.getElementById('panelClose').onclick = () => document.getElementById('panel').classList.remove('open');
document.getElementById('closePrivate').onclick = () => { document.getElementById('privatePopup').style.display='none'; privateChatWith=null; };
document.getElementById('cancelDel').onclick = () => document.getElementById('deleteModal').style.display='none';
document.getElementById('confirmDel').onclick = () => { currentDeleteAction(); document.getElementById('deleteModal').style.display='none'; };
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
